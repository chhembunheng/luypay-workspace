name: CI - Build and Test

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build-backend:
    name: Build Backend Services
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [account-service, user-service, api-gateway]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build ${{ matrix.service }}
      working-directory: ./${{ matrix.service }}
      run: mvn clean package -DskipTests
      
    - name: Run tests for ${{ matrix.service }}
      working-directory: ./${{ matrix.service }}
      run: mvn test
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.service }}-jar
        path: ${{ matrix.service }}/target/*.jar
        retention-days: 5

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: luypay-frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./luypay-frontend
      run: npm ci
      
    - name: Build frontend
      working-directory: ./luypay-frontend
      run: npm run build
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: luypay-frontend/dist
        retention-days: 5

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build account-service image
      uses: docker/build-push-action@v5
      with:
        context: ./account-service
        push: false
        tags: luypay-account-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build user-service image
      uses: docker/build-push-action@v5
      with:
        context: ./user-service
        push: false
        tags: luypay-user-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build api-gateway image
      uses: docker/build-push-action@v5
      with:
        context: ./api-gateway
        push: false
        tags: luypay-api-gateway:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Build frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./luypay-frontend
        push: false
        tags: luypay-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
