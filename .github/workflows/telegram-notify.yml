name: Telegram Notifications

on:
  push:
    branches: [ master, main ]
  pull_request:
    types: [opened, closed, reopened, synchronize]
  pull_request_review:
    types: [submitted]

jobs:
  notify-telegram:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    
    steps:
    - name: Notify on Push
      if: github.event_name == 'push'
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          🚀 **Push to ${{ github.ref_name }}**
          
          Repository: ${{ github.repository }}
          Author: ${{ github.actor }}
          
          Commit: ${{ github.event.head_commit.message }}
          
          Changes: ${{ github.event.head_commit.url }}
          
    - name: Notify on PR Open
      if: github.event_name == 'pull_request' && github.event.action == 'opened'
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          🔔 **New Pull Request Opened**
          
          Repository: ${{ github.repository }}
          Author: ${{ github.actor }}
          
          Title: ${{ github.event.pull_request.title }}
          Branch: ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}
          
          ${{ github.event.pull_request.html_url }}
          
    - name: Notify on PR Merged
      if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          ✅ **Pull Request Merged**
          
          Repository: ${{ github.repository }}
          Merged by: ${{ github.actor }}
          
          Title: ${{ github.event.pull_request.title }}
          Branch: ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}
          
          ${{ github.event.pull_request.html_url }}
          
    - name: Notify on PR Closed (not merged)
      if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          ❌ **Pull Request Closed Without Merge**
          
          Repository: ${{ github.repository }}
          Closed by: ${{ github.actor }}
          
          Title: ${{ github.event.pull_request.title }}
          Branch: ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}
          
          ${{ github.event.pull_request.html_url }}
          
    - name: Notify on PR Updated
      if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          🔄 **Pull Request Updated**
          
          Repository: ${{ github.repository }}
          Updated by: ${{ github.actor }}
          
          Title: ${{ github.event.pull_request.title }}
          Branch: ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}
          
          ${{ github.event.pull_request.html_url }}
