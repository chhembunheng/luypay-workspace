spring.application.name=user-service

# Server Configuration
server.port=${SERVER_PORT:8082}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/userdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:useruser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:userpass}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Security Configuration (if needed)
# spring.security.user.name=admin
# spring.security.user.password=admin

