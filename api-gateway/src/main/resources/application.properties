spring.application.name=api-gateway

# Server Configuration
server.port=${SERVER_PORT:8080}

# Gateway Routes Configuration
# Route to Account Service
spring.cloud.gateway.routes[0].id=account-service
spring.cloud.gateway.routes[0].uri=${SPRING_CLOUD_GATEWAY_ROUTES_0_URI:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/accounts/**

# Route to User Service
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=${SPRING_CLOUD_GATEWAY_ROUTES_1_URI:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**

# CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

