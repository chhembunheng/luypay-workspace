version: '3.8'

services:
  # PostgreSQL database for account-service
  account-db:
    image: postgres:16-alpine
    container_name: luypay-account-db-dev
    environment:
      POSTGRES_DB: accountdb
      POSTGRES_USER: accountuser
      POSTGRES_PASSWORD: accountpass
    ports:
      - "5434:5432"
    volumes:
      - account-db-data-dev:/var/lib/postgresql/data
    networks:
      - luypay-network-dev

  # PostgreSQL database for user-service
  user-db:
    image: postgres:16-alpine
    container_name: luypay-user-db-dev
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: useruser
      POSTGRES_PASSWORD: userpass
    ports:
      - "5433:5432"
    volumes:
      - user-db-data-dev:/var/lib/postgresql/data
    networks:
      - luypay-network-dev

networks:
  luypay-network-dev:
    driver: bridge

volumes:
  account-db-data-dev:
  user-db-data-dev:

